workflows:
  ios-build:
    name: Build ReadyTMS iOS App
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.readycarrier.driver
      vars:
        XCODE_WORKSPACE: ios/App/App.xcworkspace
        XCODE_SCHEME: App
        XCODE_CONFIGURATION: Release
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build mobile web app
        script: npm run mobile:build
      - name: Add iOS platform
        script: |
          rm -rf ios
          npx cap add ios
      - name: Sync Capacitor to iOS
        script: npx cap sync ios
      - name: Add iOS privacy permission strings
        script: |
          PLIST=ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :NSLocationWhenInUseUsageDescription string 'This app uses your location to show nearby loads and track active deliveries.'" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :NSLocationAlwaysAndWhenInUseUsageDescription string 'This app uses your location in the background to track active deliveries while you are on duty.'" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :NSLocationAlwaysUsageDescription string 'This app uses your location in the background to track active deliveries while you are on duty.'" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryUsageDescription string 'This app accesses your photo library to let you attach photos to delivery documents and proof of delivery.'" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string 'This app uses the camera to capture photos for proof of delivery and document scanning.'" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :NSMotionUsageDescription string 'This app uses motion data to improve location accuracy during deliveries.'" "$PLIST"
      - name: Install iOS dependencies
        script: cd ios/App && pod install
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Set build number
        script: /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $(( $(date +%s) % 99998 + 2 ))" ios/App/App/Info.plist
      - name: Build iOS app
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
  android-build:
    name: Build ReadyTMS Android App
    instance_type: linux_x2
    environment:
      vars:
        JAVA_HOME: /usr/lib/jvm/java-11-openjdk-amd64
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build mobile web app
        script: npm run mobile:build
      - name: Add Android platform
        script: |
          rm -rf android
          npx cap add android
      - name: Build Android APK
        script: |
          cd android
          ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/apk/release/*.apk
      - android/app/build/outputs/bundle/release/*.aab
    publishing:
      google_play:
        credentials: $SERVICE_ACCOUNT_CREDENTIALS
        track: internal
