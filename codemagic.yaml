workflows:
  ios-build:
      name: Build ReadyTMS iOS App
          instance_type: mac_mini_m1
              environment:
                    ios_signing:
                            distribution_type: app_store
                                    bundle_id: com.readytms.driver
                                          vars:
                                                  XCODE_WORKSPACE: "mobile/ios/App/App.xcworkspace"
                                                          XCODE_SCHEME: "App"
                                                                  XCODE_CONFIGURATION: "Release"
                                                                      triggering:
                                                                            events:
                                                                                    - push
                                                                                            - pull_request
                                                                                                  branch:
                                                                                                          include:
                                                                                                                    - main
                                                                                                                              - develop
                                                                                                                                  scripts:
                                                                                                                                        - name: Install dependencies
                                                                                                                                                script: |
                                                                                                                                                          npm install
                                                                                                                                                                
                                                                                                                                                                      - name: Build web app
                                                                                                                                                                              script: |
                                                                                                                                                                                        npm run build
                                                                                                                                                                                              
                                                                                                                                                                                                    - name: Install iOS dependencies
                                                                                                                                                                                                            script: |
                                                                                                                                                                                                                      cd mobile/ios/App
                                                                                                                                                                                                                                pod install
                                                                                                                                                                                                                                          cd ../../..
                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                      - name: Sync Capacitor to iOS
                                                                                                                                                                                                                                                              script: |
                                                                                                                                                                                                                                                                        npx cap sync ios
                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                    - name: Build iOS app
                                                                                                                                                                                                                                                                                            script: |
                                                                                                                                                                                                                                                                                                      xcodebuild build-for-testing \
                                                                                                                                                                                                                                                                                                                  -workspace "$XCODE_WORKSPACE" \
                                                                                                                                                                                                                                                                                                                              -scheme "$XCODE_SCHEME" \
                                                                                                                                                                                                                                                                                                                                          -configuration "$XCODE_CONFIGURATION" \
                                                                                                                                                                                                                                                                                                                                                      -derivedDataPath build/DerivedData \
                                                                                                                                                                                                                                                                                                                                                                  -destination generic/platform=iOS \
                                                                                                                                                                                                                                                                                                                                                                              CODE_SIGN_IDENTITY="" \
                                                                                                                                                                                                                                                                                                                                                                                          CODE_SIGNING_REQUIRED=NO
                                                                                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                                                                                      - name: Create iOS App Archive
                                                                                                                                                                                                                                                                                                                                                                                                              script: |
                                                                                                                                                                                                                                                                                                                                                                                                                        xcodebuild -archiveForExport \
                                                                                                                                                                                                                                                                                                                                                                                                                                    -workspace "$XCODE_WORKSPACE" \
                                                                                                                                                                                                                                                                                                                                                                                                                                                -scheme "$XCODE_SCHEME" \
                                                                                                                                                                                                                                                                                                                                                                                                                                                            -configuration "$XCODE_CONFIGURATION" \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                        -derivedDataPath build/DerivedData \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    -archivePath build/App.xcarchive \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                -destination generic/platform=ios
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            - name: Export IPA
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    script: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              xcodebuild -exportArchive \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          -archivePath build/App.xcarchive \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      -exportPath build/ipa \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  -exportOptionsPlist ExportOptions.plist
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      artifacts:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            - build/ipa/*.ipa
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  - build/App.xcarchive
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      publishing:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            app_store_connect:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    auth: key_id:$APP_STORE_KEY_ID
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  key:$APP_STORE_KEY
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                issuer_id:$APP_STORE_ISSUER_ID
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        submit_for_review: false
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                release_type: manual
