workflows:
  ios-build:
    name: Build ReadyTMS iOS App
    instance_type: mac_mini_m1
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_id: com.readycarrier.driver
      vars:
        XCODE_WORKSPACE: mobile/ios/App/App.xcworkspace
        XCODE_SCHEME: App
        XCODE_CONFIGURATION: Release
    triggering:
      events:
        - push
      branch:
        include:
          - main
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build web app
        script: npm run build
      - name: Install iOS dependencies
        script: cd mobile/ios/App && pod install && cd ../../..
      - name: Sync Capacitor to iOS
        script: npx cap sync ios
      - name: Build iOS app
        script: xcodebuild build -workspace "$XCODE_WORKSPACE" -scheme "$XCODE_SCHEME" -configuration "$XCODE_CONFIGURATION" -derivedDataPath build
    artifacts:
      - build/**/*.app
      - build/**/*.ipa
