workflows:
  ios-build:
    name: Build ReadyTMS iOS App
    instance_type: mac_mini_m2
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.readycarrier.driver
      vars:
        XCODE_WORKSPACE: ios/App/App.xcworkspace
        XCODE_SCHEME: App
        XCODE_CONFIGURATION: Release
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build mobile web app
        script: npm run mobile:build
      - name: Add iOS platform
        script: npx cap add ios
      - name: Sync Capacitor to iOS
        script: npx cap sync ios
      - name: Add iOS privacy permission strings
        script: |
          PLIST=ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :NSLocationWhenInUseUsageDescription string" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :NSMotionUsageDescription string" "$PLIST"
      - name: Install iOS dependencies
        script: cd ios/App && pod install
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Build iOS app
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
