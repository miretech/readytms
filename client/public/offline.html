<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>ReadyTMS Driver — Offline</title>
    <link rel="icon" href="/favicon-32.png" sizes="32x32" />
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif;
        background: #0950c3;
        color: #fff;
        text-align: center;
      }
      .card { max-width: 360px; }
      img { width: 96px; height: 96px; margin-bottom: 20px; }
      h1 { font-size: 22px; margin: 0 0 8px; }
      p { font-size: 15px; line-height: 1.5; opacity: 0.85; margin: 0 0 24px; }
      button {
        appearance: none;
        border: 0;
        background: #fff;
        color: #0950c3;
        font-size: 16px;
        font-weight: 600;
        padding: 12px 24px;
        border-radius: 10px;
        cursor: pointer;
      }
      button:active { transform: scale(0.98); }
    </style>
  </head>
  <body>
    <div class="card">
      <img src="/icon-192.png" alt="ReadyTMS Driver" />
      <h1>You're offline</h1>
      <p>
        ReadyTMS Driver needs a connection to load your trip and share your
        location. Your last actions are safe — reconnect to continue.
      </p>
      <button onclick="location.reload()">Try again</button>
    </div>
  </body>
</html>
